<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>W杯2026 旅行管理</title>
  <meta name="description" content="FIFA World Cup 2026 旅行管理ダッシュボード">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
  <header class="header">
    <div class="header__brand">
      <div class="header__logo">
        <img src="logo.png" alt="FIFA World Cup 2026" class="header__logo-img">
        <span class="header__logo-text">FIFA WORLD CUP 2026™</span>
      </div>
      <p class="header__subtitle">旅行管理ダッシュボード</p>
    </div>
    <div class="header__accent-bar"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="schedule">
      <span class="tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
          <rect x="7" y="14" width="3" height="3" rx=".5" />
        </svg></span>
      <span class="tab__label">スケジュール</span>
    </button>
    <button class="tab" data-tab="tasks">
      <span class="tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
        </svg></span>
      <span class="tab__label">タスク</span>
    </button>
    <button class="tab" data-tab="airbnb">
      <span class="tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" />
        </svg></span>
      <span class="tab__label">宿泊</span>
    </button>
    <button class="tab" data-tab="expenses">
      <span class="tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="2" />
          <circle cx="12" cy="12" r="2" />
          <path d="M6 12h.01M18 12h.01" />
        </svg></span>
      <span class="tab__label">費用</span>
    </button>
  </nav>

  <main class="main">
    <!-- SCHEDULE -->
    <section class="section active" id="section-schedule">
      <div class="section__header">
        <h1 class="section__title">スケジュール</h1><button class="btn btn--primary" id="add-schedule"><span
            class="btn__icon">＋</span><span class="btn__text">追加</span></button>
      </div>
      <div class="timeline" id="timeline-container"></div>
    </section>
    <!-- TASKS -->
    <section class="section" id="section-tasks">
      <div class="section__header">
        <h1 class="section__title">タスク</h1><button class="btn btn--primary" id="add-task"><span
            class="btn__icon">＋</span><span class="btn__text">追加</span></button>
      </div>
      <div class="task-filters"><button class="filter-btn active" data-filter="all">すべて</button><button
          class="filter-btn" data-filter="pending">未完了</button><button class="filter-btn" data-filter="done">完了</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </section>
    <!-- AIRBNB -->
    <section class="section" id="section-airbnb">
      <div class="section__header">
        <h1 class="section__title">宿泊情報</h1><button class="btn btn--primary" id="add-airbnb"><span
            class="btn__icon">＋</span><span class="btn__text">追加</span></button>
      </div>
      <div class="airbnb-list" id="airbnb-list"></div>
    </section>
    <!-- EXPENSES -->
    <section class="section" id="section-expenses">
      <div class="section__header">
        <h1 class="section__title">費用</h1><button class="btn btn--primary" id="add-expense"><span
            class="btn__icon">＋</span><span class="btn__text">追加</span></button>
      </div>
      <div class="traveler-section" id="traveler-section">
        <div class="traveler-header"><span class="traveler-header__label">旅行者</span><button class="btn btn--small"
            id="add-traveler">＋ 追加</button></div>
        <div class="traveler-chips" id="traveler-chips"></div>
      </div>
      <div class="expense-summary">
        <div class="summary-card summary-card--total">
          <p class="summary-card__label">合計</p>
          <p class="summary-card__value" id="total-expense">¥0</p>
        </div>
        <div class="summary-card summary-card--per-person">
          <p class="summary-card__label">一人あたり平均</p>
          <p class="summary-card__value" id="per-person-expense">¥0</p>
        </div>
      </div>
      <div class="traveler-breakdown" id="traveler-breakdown"></div>
      <div class="settlement-section" id="settlement-section">
        <div class="settlement-header"><span class="settlement-header__label">清算方法</span></div>
        <div class="settlement-list" id="settlement-list"></div>
      </div>
      <div class="expense-list" id="expense-list"></div>
    </section>
  </main>

  <!-- MAIN MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">追加</h2><button class="modal__close" id="modal-close">✕</button>
      </div>
      <form class="modal__body" id="modal-form"></form>
      <div class="modal__footer"><button type="button" class="btn btn--ghost" id="modal-cancel">キャンセル</button><button
          type="button" class="btn btn--primary" id="modal-save">保存</button></div>
    </div>
  </div>
  <!-- DELETE -->
  <div class="modal-overlay" id="delete-overlay">
    <div class="modal modal--small">
      <div class="modal__header">
        <h2 class="modal__title">削除確認</h2><button class="modal__close" id="delete-close">✕</button>
      </div>
      <div class="modal__body">
        <p class="delete-message">この項目を削除しますか？</p>
      </div>
      <div class="modal__footer"><button type="button" class="btn btn--ghost" id="delete-cancel">キャンセル</button><button
          type="button" class="btn btn--danger" id="delete-confirm">削除</button></div>
    </div>
  </div>
  <!-- TRAVELER ADD/EDIT -->
  <div class="modal-overlay" id="traveler-overlay">
    <div class="modal modal--medium">
      <div class="modal__header">
        <h2 class="modal__title" id="traveler-modal-title">旅行者追加</h2><button class="modal__close"
          id="traveler-close">✕</button>
      </div>
      <div class="modal__body">
        <div class="form-group"><label class="form-label" for="traveler-name-input">名前</label><input type="text"
            class="form-input" id="traveler-name-input" placeholder="例: 太郎"></div>
        <div class="form-group"><label class="form-label">カラー</label>
          <div class="color-palette" id="traveler-color-palette"></div>
        </div>
      </div>
      <div class="modal__footer"><button type="button" class="btn btn--ghost" id="traveler-cancel">キャンセル</button><button
          type="button" class="btn btn--primary" id="traveler-save">保存</button></div>
    </div>
  </div>
  <!-- EMOJI PICKER -->
  <div class="emoji-picker-overlay" id="emoji-picker-overlay">
    <div class="emoji-picker">
      <div class="emoji-picker__header"><span class="emoji-picker__title">絵文字を選択</span><button class="modal__close"
          id="emoji-picker-close">✕</button></div>
      <div class="emoji-picker__tabs" id="emoji-picker-tabs"></div>
      <div class="emoji-picker__grid" id="emoji-picker-grid"></div>
    </div>
  </div>
  <!-- CATEGORY ADD/EDIT -->
  <div class="modal-overlay" id="category-overlay">
    <div class="modal modal--medium">
      <div class="modal__header">
        <h2 class="modal__title" id="category-modal-title">カテゴリ追加</h2><button class="modal__close"
          id="category-close">✕</button>
      </div>
      <div class="modal__body">
        <div class="form-group"><label class="form-label" for="category-name-input">カテゴリ名</label><input type="text"
            class="form-input" id="category-name-input" placeholder="例: 試合"></div>
        <div class="form-group"><label class="form-label">カラー</label>
          <div class="color-palette" id="color-palette"></div>
        </div>
      </div>
      <div class="modal__footer"><button type="button" class="btn btn--ghost" id="category-cancel">キャンセル</button><button
          type="button" class="btn btn--primary" id="category-save-btn">保存</button></div>
    </div>
  </div>
  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="detail-overlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="detail-title">詳細</h2><button class="modal__close" id="detail-close">✕</button>
      </div>
      <div class="modal__body" id="detail-body"></div>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>

</html>
